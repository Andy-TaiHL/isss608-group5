name: Deploy Shiny App
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
      - name: Install dependencies
        run: |
          install.packages(c(
            "rsconnect", "shiny", "bslib", "DT",
            "dplyr", "tidyr", "purrr", "stringr", "ggplot2",
            "forcats", "readr", "tidytext", "text2vec",
            "ggraph", "tidygraph", "ggwordcloud", "ggrepel",
            "scales", "jsonlite", "lubridate", "Matrix"
          ))
        shell: Rscript {0}
      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir = "shiny-app/",
            appFiles = c(
              "app.R",
              "packages.R",
              "modules/keyword.R",
              "modules/keyword_data_wrangling.R",
              "modules/keyword_wordcloud.R",
              "modules/keyword_semantic_network.R",
              "modules/keyword_risk_timeline.R",
              "modules/network.R",
              "modules/swimlane.R",
              "data/MC1_final_00.json"
            ),
            appName = "vast-challenge2026",
            account = Sys.getenv("SHINYAPPS_ACCOUNT"),
            forceUpdate = TRUE
          )
        shell: Rscript {0}
